<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b5e3b"/>
      <stop offset="100%" stop-color="#1a2a1f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ground -->
  <rect x="0" y="340" width="512" height="172" fill="#5d814a" rx="0"/>
  <rect x="0" y="336" width="512" height="10" fill="#7aa55a"/>
  <!-- Player 1 (red worm) -->
  <circle cx="140" cy="300" r="40" fill="#db3a3a"/>
  <circle cx="130" cy="290" r="12" fill="white"/>
  <circle cx="150" cy="290" r="12" fill="white"/>
  <circle cx="127" cy="288" r="5" fill="#1f2a1f"/>
  <circle cx="147" cy="288" r="5" fill="#1f2a1f"/>
  <!-- Player 2 (blue worm) -->
  <circle cx="372" cy="300" r="40" fill="#3a7bd5"/>
  <circle cx="362" cy="290" r="12" fill="white"/>
  <circle cx="382" cy="290" r="12" fill="white"/>
  <circle cx="359" cy="288" r="5" fill="#1f2a1f"/>
  <circle cx="379" cy="288" r="5" fill="#1f2a1f"/>
  <!-- Cannon ball -->
  <circle cx="256" cy="180" r="18" fill="#f5d742"/>
  <circle cx="252" cy="176" r="6" fill="#ffb82b"/>
  <!-- Cannon trail -->
  <circle cx="200" cy="220" r="10" fill="#f5d742" opacity="0.5"/>
  <circle cx="170" cy="250" r="8" fill="#f5d742" opacity="0.3"/>
  <!-- Title text -->
  <text x="256" y="100" font-family="'Segoe UI', sans-serif" font-size="48" font-weight="bold" fill="#f0f7d8" text-anchor="middle" text-shadow="2px 2px 0 #1f3a1f">WORMS</text>
</svg>