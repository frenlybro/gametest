    <line x1="1300" y1="715" x2="1290" y2="705"/>
    <line x1="1300" y1="715" x2="1310" y2="705"/>
    <line x1="1300" y1="725" x2="1285" y2="720"/>
    <line x1="1300" y1="725" x2="1315" y2="720"/>

    <!-- Cactus 4 - small -->
