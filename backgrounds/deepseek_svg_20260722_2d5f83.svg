    <path d="M55,850 Q60,825 65,850"/>
    <path d="M300,870 Q305,850 310,870"/>
    <path d="M305,870 Q310,845 315,870"/>
    <path d="M750,880 Q755,860 760,880"/>
    <path d="M755,880 Q760,855 765,880"/>
    <path d="M1200,890 Q1205,870 1210,890"/>
    <path d="M1205,890 Q1210,865 1215,890"/>
    <path d="M1600,880 Q1605,860 1610,880"/>
    <path d="M1605,880 Q1610,855 1615,880"/>
    <path d="M1850,870 Q1855,850 1860,870"/>
    <path d="M1855,870 Q1860,845 1865,870"/>
