    <path d="M1000,280 Q1008,272 1016,280 Q1024,272 1032,280"/>
    <path d="M920,320 Q928,313 936,320 Q944,313 952,320"/>
    <path d="M1050,310 Q1057,303 1064,310 Q1071,303 1078,310"/>
