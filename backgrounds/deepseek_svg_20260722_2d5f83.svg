    <ellipse cx="860" cy="140" rx="90" ry="16" fill="#e8d5b8" opacity="0.25"/>
    <ellipse cx="740" cy="145" rx="70" ry="14" fill="#e8d5b8" opacity="0.25"/>
    <ellipse cx="820" cy="160" rx="120" ry="20" fill="#dcc4a8" opacity="0.2"/>
