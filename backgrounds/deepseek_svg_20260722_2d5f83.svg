    <ellipse cx="1660" cy="270" rx="80" ry="14" fill="#f0dcc0" opacity="0.2"/>
    <ellipse cx="1540" cy="275" rx="70" ry="12" fill="#f0dcc0" opacity="0.2"/>
  </g>

  <!-- Far mountains - layer 1 (distant) -->
