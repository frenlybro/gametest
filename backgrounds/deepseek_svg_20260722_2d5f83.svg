    <ellipse cx="1260" cy="112" rx="70" ry="12" fill="#e8d5b8" opacity="0.25"/>
    <ellipse cx="1150" cy="115" rx="60" ry="10" fill="#e8d5b8" opacity="0.25"/>
  </g>

