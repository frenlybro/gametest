    <polygon points="80,680 65,715 95,715"/>
    <polygon points="80,660 60,700 100,700"/>
    <polygon points="120,710 110,740 130,740"/>
    <polygon points="120,690 105,725 135,725"/>
    <polygon points="120,670 100,710 140,710"/>
