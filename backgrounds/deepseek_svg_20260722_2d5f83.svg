    <polygon points="400,820 415,800 430,815 440,825"/>
    <polygon points="900,810 910,795 925,805 935,815"/>
    <polygon points="1500,830 1515,810 1530,825 1540,835"/>
    <polygon points="1800,820 1810,805 1825,815 1835,825"/>
  </g>

  <!-- Horizon haze/atmosphere -->
  <rect x="0" y="550" width="1920" height="150" fill="#e88d4a" opacity="0.08"/>
  <rect x="0" y="600" width="1920" height="100" fill="#c94b4b" opacity="0.06"/>

  <!-- Sun rays - stylized -->
