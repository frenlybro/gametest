<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="25%" stop-color="#4a1942"/>
      <stop offset="45%" stop-color="#c94b4b"/>
      <stop offset="60%" stop-color="#e88d4a"/>
      <stop offset="75%" stop-color="#f4c97e"/>
      <stop offset="100%" stop-color="#fce8b6"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff9e6" stop-opacity="1"/>
      <stop offset="30%" stop-color="#fde08b" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#e88d4a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e88d4a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5a3a"/>
      <stop offset="100%" stop-color="#4a3520"/>
    </linearGradient>
    <linearGradient id="mesaGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b6b4a"/>
      <stop offset="100%" stop-color="#5a3d2a"/>
    </linearGradient>
    <linearGradient id="mesaGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5f45"/>
      <stop offset="100%" stop-color="#4d3422"/>
    </linearGradient>
    <linearGradient id="mesaGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a5240"/>
      <stop offset="100%" stop-color="#3d2a1a"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>

