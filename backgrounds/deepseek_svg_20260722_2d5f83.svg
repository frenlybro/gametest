    <ellipse cx="350" cy="190" rx="80" ry="15" fill="#e8d5b8" opacity="0.3"/>
    <ellipse cx="250" cy="195" rx="60" ry="12" fill="#e8d5b8" opacity="0.3"/>
    <ellipse cx="320" cy="210" rx="100" ry="18" fill="#dcc4a8" opacity="0.3"/>
  </g>

  <!-- Cloud 2 -->
  <g opacity="0.5">
