  <polygon points="50,530 120,510 180,530 150,540 100,535 60,545" fill="#9a7a5a" opacity="0.4"/>

  <!-- Mesa center-left -->
  <polygon points="300,650 340,560 400,540 440,550 470,570 490,620 520,650 300,650" fill="url(#mesaGrad2)"/>
  <polygon points="340,560 400,540 440,550 410,560 370,555 350,565" fill="#8a6a4a" opacity="0.4"/>

  <!-- Large mesa center -->
  <polygon points="550,680 600,570 660,540 720,550 760,580 790,610 820,650 850,680 550,680" fill="url(#mesaGrad1)"/>
  <polygon points="600,570 660,540 720,550 680,565 630,560 610,575" fill="#9a7a5a" opacity="0.4"/>

  <!-- Mesa right -->
  <polygon points="1100,700 1140,610 1200,580 1260,590 1300,620 1340,650 1380,700 1100,700" fill="url(#mesaGrad2)"/>
  <polygon points="1140,610 1200,580 1260,590 1220,605 1170,600 1150,615" fill="#8a6a4a" opacity="0.4"/>

  <!-- Small mesa far right -->
  <polygon points="1500,720 1530,640 1580,620 1620,630 1650,660 1680,720 1500,720" fill="url(#mesaGrad3)"/>
  <polygon points="1530,640 1580,620 1620,630 1590,640 1550,635 1540,645" fill="#7a5a3a" opacity="0.4"/>

  <!-- Distant buttes -->
