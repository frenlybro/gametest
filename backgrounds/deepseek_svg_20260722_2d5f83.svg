    <circle cx="500" cy="780" r="6"/>
    <circle cx="800" cy="770" r="7"/>
    <circle cx="1100" cy="790" r="5"/>
    <circle cx="1550" cy="775" r="6"/>
    <circle cx="1850" cy="785" r="5"/>
    <circle cx="350" cy="790" r="4"/>
