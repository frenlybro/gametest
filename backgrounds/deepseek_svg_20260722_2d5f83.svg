    <polygon points="1500,380 1300,600 1400,600"/>
    <polygon points="1500,380 1450,600 1550,600"/>
    <polygon points="1500,380 1600,600 1700,600"/>
    <polygon points="1500,380 1750,550 1850,550"/>
    <polygon points="1500,380 1200,550 1300,550"/>
