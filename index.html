<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Worms Duel">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="application-name" content="Worms Duel">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" content="Two-player Worms-style artillery duel game">
    <link rel="manifest" href="manifest.json?v=1.0.2">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <title>Worms · two-player duel</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        /* ── rotate-device overlay ── */
        #rotateOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            height: -webkit-fill-available;
            background: #000;
            z-index: 9999;
            color: #f0f7d8;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #rotateOverlay .icon {
            font-size: clamp(4rem, 12vw, 8rem);
            animation: rotate-phone 2s ease-in-out infinite;
            margin-bottom: 1.5rem;
        }
        #rotateOverlay h2 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin: 0 0 0.8rem;
            text-shadow: 2px 2px 0 #000;
        }
        #rotateOverlay p {
            font-size: clamp(1rem, 3vw, 1.5rem);
            opacity: 0.8;
            margin: 0;
            max-width: 400px;
        }
        @keyframes rotate-phone {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            75% { transform: rotate(90deg); }
        }

        @media (orientation: portrait) {
            #rotateOverlay { display: flex; }
            #gameCanvas { display: none !important; }
            #uiOverlay { display: none !important; }
        }
        @media (orientation: landscape) {
            #rotateOverlay { display: none !important; }
        }

        /* Canvas fills entire screen */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        /* UI overlay at bottom */
        #uiOverlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: clamp(8px, 1.5vmin, 20px);
            padding-bottom: calc(env(safe-area-inset-bottom) + clamp(8px, 1.5vmin, 20px));
            background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            z-index: 10;
            pointer-events: none;
        }
        #uiPanel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: clamp(4px, 1vmin, 12px);
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: auto;
            color: #f0f7d8;
            font-weight: 600;
            font-size: clamp(0.65rem, 1.5vmin, 1.2rem);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .player-badge {
            display: flex;
            align-items: center;
            gap: clamp(4px, 0.6vmin, 10px);
            white-space: nowrap;
        }
        .player-badge span {
            display: inline-block;
            width: clamp(10px, 1.5vmin, 18px);
            height: clamp(10px, 1.5vmin, 18px);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            flex-shrink: 0;
        }
        .p1-color { background: #db3a3a; }
        .p2-color { background: #3a7bd5; }
        .turn-indicator {
            padding: clamp(3px, 0.4vmin, 0.4rem) clamp(8px, 1.2vmin, 1.8rem);
            border-radius: 40px;
            font-size: clamp(0.7rem, 1.8vmin, 1.4rem);
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        .status-msg {
            padding: clamp(2px, 0.2vmin, 0.25rem) clamp(8px, 1.2vmin, 1.8rem);
            border-radius: 30px;
            font-size: clamp(0.6rem, 1.3vmin, 1.1rem);
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        .btn-reset {
            background: rgba(218, 191, 122, 0.85);
            border: none;
            font-weight: bold;
            font-size: clamp(0.65rem, 1.5vmin, 1.2rem);
            padding: clamp(4px, 0.4vmin, 0.5rem) clamp(10px, 1.2vmin, 1.8rem);
            border-radius: 40px;
            color: #252d1a;
            cursor: pointer;
            transition: 0.08s linear;
            letter-spacing: 0.5px;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .btn-reset:active {
            transform: translateY(clamp(1px, 0.2vmin, 3px));
        }
        .btn-reset:hover {
            background: rgba(232, 207, 136, 0.9);
        }

        @media (max-width: 500px), (max-height: 400px) {
            #uiPanel { gap: 4px; }
            .player-badge span { width: 8px; height: 8px; border-width: 1px; }
        }
    </style>
</head>
<body>
    <!-- Landscape-only overlay -->
    <div id="rotateOverlay">
        <div class="icon">📱</div>
        <h2>Rotate your device</h2>
        <p>Please rotate your phone or tablet to landscape mode for the best experience.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="uiOverlay">
        <div id="uiPanel">
            <div class="player-badge">
                <span class="p1-color"></span> Player 1
            </div>
            <div class="turn-indicator" id="turnIndicator">▶ P1</div>
            <div class="status-msg" id="statusMsg">⚔️ aim & fire</div>
            <button class="btn-reset" id="resetBtn">↺ new round</button>
            <div class="player-badge">
                <span class="p2-color"></span> Player 2
            </div>
        </div>
    </div>

    <script src="index.js?v=1.0.21"></script>
    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.error('SW registration failed:', err));
        }

        // Lock orientation if API available (modern mobile browsers)
        if ('orientation' in screen && screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {
                console.log('Orientation lock not supported');
            });
        }
    </script>
</body>
</html>
