<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Worms Duel">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="application-name" content="Worms Duel">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" content="Two-player Worms-style artillery duel game">
    <link rel="manifest" href="manifest.json?v=1.0.2">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <title>Worms · two-player duel</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        html {
            width: 100%;
            height: -webkit-fill-available;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        body {
            width: 100%;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a2a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        /* ── rotate-device overlay ── */
        #rotateOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            height: -webkit-fill-available;
            background: #1a2a1f;
            z-index: 9999;
            color: #f0f7d8;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #rotateOverlay .icon {
            font-size: clamp(4rem, 12vw, 8rem);
            animation: rotate-phone 2s ease-in-out infinite;
            margin-bottom: 1.5rem;
        }
        #rotateOverlay h2 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin: 0 0 0.8rem;
            text-shadow: 2px 2px 0 #1f3a1f;
        }
        #rotateOverlay p {
            font-size: clamp(1rem, 3vw, 1.5rem);
            opacity: 0.8;
            margin: 0;
            max-width: 400px;
        }
        @keyframes rotate-phone {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            75% { transform: rotate(90deg); }
        }

        /* Show overlay in portrait */
        @media (orientation: portrait) {
            #rotateOverlay { display: flex; }
            .game-container { display: none !important; }
        }
        /* In landscape, hide overlay even when forced */
        @media (orientation: landscape) {
            #rotateOverlay { display: none !important; }
        }

        .game-wrapper {
            width: 100%;
            height: 100dvh;
            height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }
        .game-container {
            background: #3b5e3b;
            padding: 10px;
            border-radius: clamp(1rem, 3vmin, 3rem);
            box-shadow: 0 20px 30px rgba(0,0,0,0.6), inset 0 2px 4px #7faa7f;
            border-bottom: clamp(2px, 0.5vmin, 6px) solid #2a452a;
            max-width: 100vw;
            max-height: 100%;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ── Canvas responsive container ── */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            border-radius: clamp(10px, 2vmin, 28px);
            overflow: hidden;
            background: #9ac7c7;
            background-image: radial-gradient(circle at 10% 20%, #b5e0e0 2%, #7fb3b3 80%);
            box-shadow: inset 0 calc(-1 * clamp(2px, 0.6vmin, 8px)) 0 #5f7e7e, 0 10px 18px rgba(0,0,0,0.4);
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
            -webkit-touch-callout: none;
            /* actual size kept at 800x400 via attributes */
        }

        .ui-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: clamp(8px, 1.5vmin, 20px);
            padding: 0 clamp(2px, 0.5vmin, 6px);
            color: #f0f7d8;
            text-shadow: 2px 2px 0 #1f3a1f;
            font-weight: 600;
            font-size: clamp(0.65rem, 1.5vmin, 1.2rem);
            gap: clamp(4px, 1vmin, 12px);
            flex-wrap: wrap;
            justify-content: center;
        }
        .player-badge {
            background: #2c472c;
            padding: clamp(4px, 0.6vmin, 0.6rem) clamp(8px, 1.2vmin, 1.6rem);
            border-radius: 40px;
            box-shadow: inset 0 calc(-1 * clamp(1px, 0.2vmin, 3px)) 0 #142214, 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: clamp(4px, 0.6vmin, 10px);
            white-space: nowrap;
        }
        .player-badge span {
            display: inline-block;
            width: clamp(10px, 1.5vmin, 18px);
            height: clamp(10px, 1.5vmin, 18px);
            border-radius: 50%;
            border: 2px solid #d4e6b0;
            flex-shrink: 0;
        }
        .p1-color { background: #db3a3a; }
        .p2-color { background: #3a7bd5; }
        .turn-indicator {
            background: #2c3e2c;
            padding: clamp(3px, 0.4vmin, 0.4rem) clamp(8px, 1.2vmin, 1.8rem);
            border-radius: 40px;
            font-size: clamp(0.7rem, 1.8vmin, 1.4rem);
            letter-spacing: 1px;
            border: 1px solid #b3d9a0;
            box-shadow: inset 0 calc(-1 * clamp(1px, 0.2vmin, 2px)) 0 #1d2e1d;
            white-space: nowrap;
        }
        .status-msg {
            background: #1f2f1f;
            padding: clamp(2px, 0.2vmin, 0.25rem) clamp(8px, 1.2vmin, 1.8rem);
            border-radius: 30px;
            font-size: clamp(0.6rem, 1.3vmin, 1.1rem);
            border: 1px solid #6f946f;
            white-space: nowrap;
        }
        .btn-reset {
            background: #dabf7a;
            border: none;
            font-weight: bold;
            font-size: clamp(0.65rem, 1.5vmin, 1.2rem);
            padding: clamp(4px, 0.4vmin, 0.5rem) clamp(10px, 1.2vmin, 1.8rem);
            border-radius: 40px;
            color: #252d1a;
            box-shadow: 0 clamp(2px, 0.4vmin, 5px) 0 #8f7a4a, 0 4px 12px black;
            cursor: pointer;
            transition: 0.08s linear;
            letter-spacing: 0.5px;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .btn-reset:active {
            transform: translateY(clamp(2px, 0.3vmin, 4px));
            box-shadow: 0 1px 0 #7a663b;
        }
        .btn-reset:hover {
            background: #e8cf88;
        }

        /* Very small screens - stack UI */
        @media (max-width: 500px), (max-height: 400px) {
            .ui-panel {
                gap: 4px;
                margin-top: 4px;
            }
            .player-badge {
                padding: 2px 8px;
                font-size: 0.6rem;
            }
            .player-badge span {
                width: 8px;
                height: 8px;
                border-width: 1px;
            }
            .turn-indicator {
                padding: 2px 8px;
                font-size: 0.65rem;
            }
            .status-msg {
                padding: 2px 8px;
                font-size: 0.6rem;
            }
            .btn-reset {
                padding: 2px 10px;
                font-size: 0.65rem;
                box-shadow: 0 2px 0 #8f7a4a, 0 2px 6px black;
            }
            .btn-reset:active {
                transform: translateY(1px);
            }
        }
    </style>
</head>
<body>
    <!-- Landscape-only overlay -->
    <div id="rotateOverlay">
        <div class="icon">📱</div>
        <h2>Rotate your device</h2>
        <p>Please rotate your phone or tablet to landscape mode for the best experience.</p>
    </div>

    <div class="game-wrapper">
        <div class="game-container">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="800" height="400"></canvas>
            </div>

            <div class="ui-panel">
                <div class="player-badge">
                    <span class="p1-color"></span> Player 1
                </div>
                <div class="turn-indicator" id="turnIndicator">▶ P1</div>
                <div class="status-msg" id="statusMsg">⚔️ aim & fire</div>
                <button class="btn-reset" id="resetBtn">↺ new round</button>
                <div class="player-badge">
                    <span class="p2-color"></span> Player 2
                </div>
            </div>
        </div>
    </div>

    <script src="index.js?v=1.0.11"></script>
    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.error('SW registration failed:', err));
        }

        // Lock orientation if API available (modern mobile browsers)
        if ('orientation' in screen && screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {
                console.log('Orientation lock not supported');
            });
        }
    </script>
</body>
</html>
